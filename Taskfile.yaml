version: '3'

vars:
  BINARY_NAME: kvf
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  LDFLAGS: -s -w -X main.version={{.VERSION}}
  DOCS_DIR: docs
  PAGER:
    sh: echo "${PAGER:-less -R}"

tasks:

  default:
    silent: true
    cmds:
      - task -l

  test:
    desc: "Run tests"
    cmds:
      - go test -v ./...

  print-version:
    desc: "Print version"
    cmds:
      - echo "{{.VERSION}}"

  build:
    desc: "Build binary for current platform"
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o build/{{.BINARY_NAME}}

  build:all:
    desc: "Build binaries for all supported architectures"
    deps:
      - build:darwin-amd64
      - build:darwin-arm64
      - build:linux-amd64
      - build:linux-arm64
      - build:linux-arm
      - build:windows-amd64
      - build:windows-arm64

  build:darwin-amd64:
    desc: "Build binary for Darwin (macOS) amd64"
    env:
      GOOS: darwin
      GOARCH: amd64
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o build/{{.BINARY_NAME}}-darwin-amd64

  build:darwin-arm64:
    desc: "Build binary for Darwin (macOS) arm64"
    env:
      GOOS: darwin
      GOARCH: arm64
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o build/{{.BINARY_NAME}}-darwin-arm64

  build:linux-amd64:
    desc: "Build binary for Linux amd64"
    env:
      GOOS: linux
      GOARCH: amd64
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o build/{{.BINARY_NAME}}-linux-amd64

  build:linux-arm64:
    desc: "Build binary for Linux arm64"
    env:
      GOOS: linux
      GOARCH: arm64
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o build/{{.BINARY_NAME}}-linux-arm64

  build:linux-arm:
    desc: "Build binary for Linux arm (32-bit)"
    env:
      GOOS: linux
      GOARCH: arm
      GOARM: 7
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o build/{{.BINARY_NAME}}-linux-arm

  build:windows-amd64:
    desc: "Build binary for Windows amd64"
    env:
      GOOS: windows
      GOARCH: amd64
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o build/{{.BINARY_NAME}}-windows-amd64.exe

  build:windows-arm64:
    desc: "Build binary for Windows arm64"
    env:
      GOOS: windows
      GOARCH: arm64
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o build/{{.BINARY_NAME}}-windows-arm64.exe

  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf build/

  release:
    desc: "Create a GitHub release with all binaries (requires gh CLI)"
    deps:
      - build:all
    cmds:
      - |
        gh release create {{.VERSION}} \
          build/{{.BINARY_NAME}}-darwin-amd64 \
          build/{{.BINARY_NAME}}-darwin-arm64 \
          build/{{.BINARY_NAME}}-linux-amd64 \
          build/{{.BINARY_NAME}}-linux-arm64 \
          build/{{.BINARY_NAME}}-linux-arm \
          build/{{.BINARY_NAME}}-windows-amd64.exe \
          build/{{.BINARY_NAME}}-windows-arm64.exe \
          --title "{{.VERSION}}" \
          --generate-notes

  release:draft:
    desc: "Create a draft GitHub release with all binaries (requires gh CLI)"
    deps:
      - build:all
    cmds:
      - |
        gh release create {{.VERSION}} \
          build/{{.BINARY_NAME}}-darwin-amd64 \
          build/{{.BINARY_NAME}}-darwin-arm64 \
          build/{{.BINARY_NAME}}-linux-amd64 \
          build/{{.BINARY_NAME}}-linux-arm64 \
          build/{{.BINARY_NAME}}-linux-arm \
          build/{{.BINARY_NAME}}-windows-amd64.exe \
          build/{{.BINARY_NAME}}-windows-arm64.exe \
          --title "{{.VERSION}}" \
          --generate-notes \
          --draft

  release:prerelease:
    desc: "Create a pre-release GitHub release with all binaries (requires gh CLI)"
    deps:
      - build:all
    cmds:
      - |
        gh release create {{.VERSION}} \
          build/{{.BINARY_NAME}}-darwin-amd64 \
          build/{{.BINARY_NAME}}-darwin-arm64 \
          build/{{.BINARY_NAME}}-linux-amd64 \
          build/{{.BINARY_NAME}}-linux-arm64 \
          build/{{.BINARY_NAME}}-linux-arm \
          build/{{.BINARY_NAME}}-windows-amd64.exe \
          build/{{.BINARY_NAME}}-windows-arm64.exe \
          --title "{{.VERSION}}" \
          --generate-notes \
          --prerelease

  docs:
    desc: "View documentation (usage: task docs DOC=<docname>)"
    vars:
      DOC_NAME: '{{.DOC | default "README"}}'
      DOC_FILE: '{{.DOCS_DIR}}/{{.DOC_NAME}}.adoc'
    cmds:
      - |
        if [ -f "{{.DOC_FILE}}" ]; then
          {{.PAGER}} "{{.DOC_FILE}}"
        elif [ -f "{{.DOC_NAME}}.adoc" ]; then
          {{.PAGER}} "{{.DOC_NAME}}.adoc"
        else
          echo "Document not found: {{.DOC_FILE}}"
          echo ""
          echo "Available documentation:"
          task docs:list
        fi

  docs:list:
    desc: "List available documentation"
    silent: true
    cmds:
      - |
        echo "In docs/:"
        if ls {{.DOCS_DIR}}/*.adoc 1>/dev/null 2>&1; then
          ls -1 {{.DOCS_DIR}}/*.adoc | xargs -n1 basename | sed 's/.adoc$//' | while read doc; do
            echo "  - $doc"
          done
        else
          echo "  (none)"
        fi
        echo ""
        echo "In root:"
        if ls *.adoc 1>/dev/null 2>&1; then
          ls -1 *.adoc | sed 's/.adoc$//' | while read doc; do
            echo "  - $doc"
          done
        else
          echo "  (none)"
        fi

  docs:all:
    desc: "View all documentation concatenated"
    cmds:
      - |
        for doc in {{.DOCS_DIR}}/*.adoc; do
          if [ -f "$doc" ]; then
            echo "=== $(basename "$doc" .adoc) ==="
            cat "$doc"
            echo -e "\n\n"
          fi
        done | {{.PAGER}}
